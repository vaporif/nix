defaultPref("privacy.resistFingerprinting.letterboxing", true);
defaultPref("webgl.disabled", false);

// Disable Pocket integration
defaultPref("extensions.pocket.enabled", false);

// Stricter referrer policy (only send origin, not full URL)
defaultPref("network.http.referer.XOriginPolicy", 2);
defaultPref("network.http.referer.XOriginTrimmingPolicy", 2);

// Disable search suggestions (sends keystrokes to search engine as you type)
defaultPref("browser.search.suggest.enabled", false);
defaultPref("browser.urlbar.suggest.searches", false);

// Disable speculative connections (preloading pages you haven't clicked)
defaultPref("network.http.speculative-parallel-limit", 0);
defaultPref("browser.urlbar.speculativeConnect.enabled", false);
