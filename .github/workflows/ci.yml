name: "CI"
on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.githooks/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.githooks/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install tools via cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install linters
        run: cargo binstall -y selene stylua taplo-cli typos-cli

      - name: Lint Lua (selene)
        working-directory: config/nvim
        run: selene lua after init.lua

      - name: Check Lua formatting (stylua)
        run: stylua --check config/

      - name: Lint TOML (taplo)
        run: taplo check

      - name: Check typos
        run: typos

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts

      - uses: raven-actions/actionlint@v2

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  flake-check:
    # arm64 runner so the aarch64-linux configs and checks actually evaluate
    # (x86_64 runners would skip every output as an incompatible system).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nix flake check
        run: nix flake check --print-build-logs

