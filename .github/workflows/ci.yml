name: "CI"
on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.serena/**'
      - '.githooks/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.serena/**'
      - '.githooks/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            build-cmd: nix build .#darwinConfigurations.burnedapple.system
            lint: true
            check: false
          - runner: ubuntu-24.04-arm
            build-cmd: nix build '.#nixosConfigurations.nixos.config.system.build.toplevel'
            lint: false
            check: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Free disk space (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo rm -rf /Applications/Xcode*.app
          sudo rm -rf /Users/runner/Library/Android
          sudo rm -rf /opt/hostedtoolcache
          df -h /

      - name: Check nix flake
        if: matrix.lint || matrix.check
        run: nix flake check

      - name: Check nix formatting
        if: matrix.lint
        run: nix run nixpkgs#alejandra -- --check .

      - name: Lint nix (statix)
        if: matrix.lint
        run: nix run nixpkgs#statix -- check

      - name: Dead code (deadnix)
        if: matrix.lint
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Build
        run: ${{ matrix.build-cmd }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install tools via cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install linters
        run: cargo binstall -y selene stylua taplo-cli typos-cli

      - name: Lint Lua (selene)
        working-directory: config/nvim
        run: selene lua after init.lua

      - name: Check Lua formatting (stylua)
        run: stylua --check config/

      - name: Lint TOML (taplo)
        run: taplo check

      - name: Check typos
        run: typos

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts

      - uses: raven-actions/actionlint@v2

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

