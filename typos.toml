[files]
extend-exclude = [
  "*.lock",
  "lazy-lock.json",
  "secrets/*",
  # Vendored binaries — hashes are auto-generated nix32 base32 strings
  # and frequently match real words by chance.
  "pkgs/claude-code/package.nix",
  "pkgs/codex/package.nix",
]

[default]
# which-key descriptions highlight a keystroke with bracket notation —
# either as a prefix ([k]eymaps) or suffix (ove[r]). Match the whole token
# as one span so we don't have to allowlist each stripped form.
extend-ignore-re = ['[a-zA-Z]*\[[A-Za-z]\][a-zA-Z]*']

[default.extend-identifiers]
# Ruff lint rule codes
CPY001 = "CPY001"

[default.extend-words]
# Allow these "typos" (technical terms, usernames, etc.)
ba = "ba"
hl = "hl"
Hashi = "Hashi"
# Nix terminology
substituters = "substituters"
# Plugin names
noice = "noice"
Noice = "Noice"
# Neovim builtins
enew = "enew"
